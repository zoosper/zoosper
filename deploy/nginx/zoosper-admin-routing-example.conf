# Zoosper Nginx admin routing example.
#
# Problem this avoids:
#   /admin/ matching the real static directory public/admin/ and returning:
#   directory index of "zoosper/public/admin/" is forbidden
#
# Keep static admin assets explicit, then route /admin and /admin/* through the
# PHP front controller. Do not enable autoindex for public/admin.

# Static admin assets generated by module-owned admin asset registry.
location ^~ /admin/css/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
}

location ^~ /admin/js/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
}

# Admin application routes must go to the front controller, not public/admin/.
location = /admin {
    try_files /index.php =404;
}

location = /admin/ {
    try_files /index.php =404;
}

location ^~ /admin/ {
    try_files /index.php =404;
}

# Generic frontend fallback. Avoid $uri/ because it can make Nginx try to serve
# an existing directory before the PHP application sees the request.
location / {
    try_files $uri /index.php$is_args$args;
}
