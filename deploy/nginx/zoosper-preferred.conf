# Zoosper preferred Nginx server block example.
#
# Goals:
# - Never serve PHP source as a download.
# - Keep /admin as an application route, not a static directory listing.
# - Keep module assets explicit and cacheable.
# - Avoid autoindex for security.
# - Prepare for future /assets/(admin|frontend|...) static asset paths.

server {
    listen 80;
    server_name zoosper.example.com.au;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zoosper.example.com.au;

    ssl_certificate /etc/ssl/example/certs/example.crt;
    ssl_certificate_key /etc/ssl/example/certs/example.rsa;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    root /home/vagrant/zoosper/public;
    index index.php;

    access_log /var/log/nginx/zoosper-access.log;
    error_log /var/log/nginx/zoosper-error.log;

    autoindex off;

    # Future preferred asset namespace.
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Temporary legacy admin asset paths while Phase 0.29/0.30 assets still use /admin/css and /admin/js.
    location ^~ /admin/css/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ^~ /admin/js/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Do not allow direct execution/download of arbitrary PHP files.
    location ~ \.php$ {
        return 404;
    }

    # Main application routes. Avoid `$uri/` so existing physical directories
    # such as public/admin do not trigger directory-index checks.
    location / {
        try_files $uri @zoosper_front_controller;
    }

    # PHP front controller named location. This is the only location that passes
    # to PHP-FPM, so index.php is executed instead of being downloaded.
    location @zoosper_front_controller {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_index index.php;
    }
}
