# Zoosper public webroot hardening include.
# Include inside the HTTPS server block before the generic front-controller fallback.

# Never expose directory listings.
autoindex off;

# Block runtime/private/source-like paths if they ever appear under public/.
location ^~ /var/ { return 404; }
location ^~ /storage/ { return 404; }
location ^~ /vendor/ { return 404; }
location ^~ /app/ { return 404; }
location ^~ /config/ { return 404; }
location ^~ /modules/ { return 404; }
location ^~ /tools/ { return 404; }
location ^~ /logs/ { return 404; }
location ^~ /log/ { return 404; }
location ^~ /cache/ { return 404; }
location ^~ /private/ { return 404; }
location ^~ /tmp/ { return 404; }

# Public static assets are allowed by exact file existence only.
location ^~ /static/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public";
}

location ^~ /assets/ {
    try_files $uri =404;
    access_log off;
    expires 7d;
    add_header Cache-Control "public";
}

# Block arbitrary script-like files from the webroot. The front controller should
# be executed only by the dedicated named location/front-controller config.
location ~* \.(?:php|phtml|phar|php3|php4|php5|php7|php8|cgi|pl|py|rb|sh|bash|exe|dll|so)$ {
    return 404;
}
